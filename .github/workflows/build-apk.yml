name: Build Android APK

on:
  workflow_dispatch:  # 仅允许手动触发

permissions:
  contents: write  # 允许创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史,用于生成 commit log
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;28.2.13676358"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get

      - name: Configure Android release signing
        env:
          STAR_BANK_UPLOAD_KEYSTORE_BASE64: ${{ secrets.STAR_BANK_UPLOAD_KEYSTORE_BASE64 }}
          STAR_BANK_STORE_PASSWORD: ${{ secrets.STAR_BANK_STORE_PASSWORD }}
          STAR_BANK_KEY_PASSWORD: ${{ secrets.STAR_BANK_KEY_PASSWORD }}
          STAR_BANK_KEY_ALIAS: ${{ secrets.STAR_BANK_KEY_ALIAS }}
        run: |
          if [ -z "$STAR_BANK_UPLOAD_KEYSTORE_BASE64" ] || \
             [ -z "$STAR_BANK_STORE_PASSWORD" ] || \
             [ -z "$STAR_BANK_KEY_PASSWORD" ] || \
             [ -z "$STAR_BANK_KEY_ALIAS" ]; then
            echo "::error::Missing Android release signing secrets. Use the same keystore as the GitHub Action release APKs."
            exit 1
          fi
          echo "$STAR_BANK_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$STAR_BANK_STORE_PASSWORD"
            echo "keyPassword=$STAR_BANK_KEY_PASSWORD"
            echo "keyAlias=$STAR_BANK_KEY_ALIAS"
          } > android/key.properties
      
      - name: Build APK
        run: flutter build apk --release
      
      # 获取版本号和时间戳用于 Release 标签
      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r')
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$TIMESTAMP" >> $GITHUB_OUTPUT
      
      # 生成 Release 说明文件
      - name: Generate Release Notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP="${{ steps.version.outputs.timestamp }}"
          TAG_NAME="${{ steps.version.outputs.tag }}"
          
          # 获取最近的 tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          PREV_TAG_DISPLAY=${PREV_TAG:-"初始版本"}
          
          # 开始写入 Markdown 文件
          echo "## 🌟 Star Bank v$VERSION" > release_body.md
          echo "" >> release_body.md
          
          echo "### 📝 更新内容" >> release_body.md
          if [ -z "$PREV_TAG" ]; then
            # 如果没有 tag，显示最近 20 条
            git log -20 --pretty=format:"- %s" --no-merges >> release_body.md
          else
            # 显示两个 tag 之间的差异
            git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges >> release_body.md
          fi
          
          echo "" >> release_body.md
          
          # 打印内容以供检查
          cat release_body.md
      
      # 重命名 APK 文件
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/star-bank-${{ steps.version.outputs.version }}.apk
      
      # 创建 Release 并上传 APK
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Star Bank ${{ steps.version.outputs.version }}
          body_path: release_body.md
          files: build/app/outputs/flutter-apk/star-bank-${{ steps.version.outputs.version }}.apk
          prerelease: false
